services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '0.0.0.0:${NGINX_PORT:-80}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx
    profiles:
      - remote
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - '3000'
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api/v1
      # Public URL used for upload links — set via start-server.sh or .env (LAN IP / domain)
      APP_URL: ${PUBLIC_URL:-http://localhost:${NGINX_PORT:-80}}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:${NGINX_PORT:-80}}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/devsinn_insights?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UPLOAD_STORAGE: local
      UPLOAD_LOCAL_PATH: /app/uploads
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-min-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-min-32-chars}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
    command: ./scripts/docker-entrypoint.sh
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://127.0.0.1:3000/api/docs'', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    expose:
      - '5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devsinn_insights
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - '6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
